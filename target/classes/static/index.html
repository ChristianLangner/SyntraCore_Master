<!DOCTYPE html>
<html>
<head>
    <title>AyntraCore - Chat</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/main.css">
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.1.2/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body>
<div class="container">
    <div class="py-5 text-center">
        <h2 id="persona-name">AyntraCore</h2>
        <p class="lead">Real-time AI Chat & Image Generation</p>
    </div>
    <div class="profile-selector mb-3 d-flex justify-content-center">
        <div class="btn-group" role="group">
            <button id="btn-astra" type="button" class="btn btn-outline-primary">Astra</button>
            <button id="btn-seraphina" type="button" class="btn btn-outline-danger">Seraphina</button>
            <button id="btn-luna" type="button" class="btn btn-outline-info">Luna</button>
        </div>
    </div>

    <!-- Settings Panel -->
    <div class="card bg-light mb-4" id="settings-panel">
        <div class="card-body">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <label for="model-select" class="form-label">AI Modell</label>
                    <select id="model-select" class="form-select form-select-sm">
                        <!-- Text Models -->
                        <option value="google/gemini-flash-1.5">Google Gemini Flash 1.5</option>
                        <option value="mistralai/mistral-7b-instruct">Mistral 7B Instruct</option>
                        <option value="anthropic/claude-3-haiku-20240307">Anthropic Claude 3 Haiku</option>
                        <!-- Image Models -->
                        <option value="openai/dall-e-3">OpenAI DALL-E 3</option>
                        <option value="stabilityai/stable-diffusion-xl-base-1.0">Stable Diffusion XL</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label for="temperature-slider" class="form-label">Temperatur: <span id="temperature-value">0.7</span></label>
                    <input type="range" class="form-range" id="temperature-slider" min="0" max="2" step="0.1" value="0.7">
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-7">
            <div class="chat-box">
                <div id="chat-messages" class="chat-messages"></div>
                <div class="input-group mt-3">
                    <input type="text" id="message" class="form-control" placeholder="Schreibe eine Nachricht...">
                    <button id="send" class="btn btn-primary" type="button">Senden</button>
                </div>
            </div>
        </div>
        <div class="col-md-5">
            <div id="image-display-area" class="card">
                <div class="card-header">Generiertes Bild</div>
                <div class="card-body text-center">
                    <img id="generated-image" src="" class="img-fluid rounded" alt="Bild wird hier angezeigt...">
                    <div id="image-loading-spinner" class="spinner-border text-primary d-none" role="status">
                        <span class="visually-hidden">Laden...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
