# Für schnelle lokale Tests OHNE externe Abhängigkeiten

# Database: H2 In-Memory (PostgreSQL-kompatibel)
spring.datasource.url=jdbc:h2:mem:ayntracoredb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate: Auto-Schema für Development
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# H2 Console aktiviert
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# AI Service Stub (optional: Mock oder echte API)
ai.api.url=https://openrouter.ai/api/v1
ai.api.key=${OPENROUTER_API_KEY:stub-dev-key}
ai.model=deepseek/deepseek-chat

# Logging (Development: verbose)
logging.level.com.ayntracore=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.web=DEBUG
