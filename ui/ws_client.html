
<!doctype html>
<html><head><meta charset="utf-8"><title>WS Client</title></head>
<body>
<h3>WebSocket Test (/ws/insights)</h3>
<pre id="log"></pre>
<script>
  const log = (m)=>document.getElementById('log').textContent += m + "
";
  try{
    const ws = new WebSocket('ws://localhost/ws/insights');
    ws.onopen = ()=>log('OPEN');
    ws.onmessage = (e)=>log('MSG ' + e.data);
    ws.onerror = (e)=>log('ERR ' + (e.message||''));
    ws.onclose = ()=>log('CLOSE');
  }catch(e){ log('INIT ERR ' + e.message); }
</script>
</body></html>
