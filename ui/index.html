<!doctype html>
<html lang="de" class="h-full bg-slate-950">
  <head>
    <meta http-equiv="Content-Security-Policy" content="img-src * data: blob:;">
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Astra Noir | Executive Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { primary: 'var(--primary-color)' } } } }</script>
    <link rel="stylesheet" href="noir.css">
  </head>
  <body class="h-full text-slate-200 selection:bg-primary/30">
    <div id="toast-container"></div>
    <div class="fixed inset-0 -z-10 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-primary/30 via-slate-900 to-slate-950"></div>
    <div class="mx-auto max-w-[1400px] p-4 md:p-6">
      <header class="mb-4 flex items-center justify-between">
        <h1 class="text-2xl md:text-3xl font-semibold">Ayntra Core <span id="persona-name" class="text-primary"></span> Dashboard</h1>
      </header>
      <div class="grid grid-cols-1 lg:grid-cols-12 gap-4">
        <main class="lg:col-span-8 space-y-4">
          <section class="glass p-4">
            <div id="chatStream" class="max-h-[540px] overflow-auto space-y-3">
            </div>
            <div class="mt-3 flex items-center gap-2">
              <input id="chatInput" placeholder="Frage an Astra stellen…" class="flex-1 rounded-lg bg-slate-900/80 border border-white/10 px-3 py-2" />
              <button id="sendBtn" class="px-4 py-2 rounded-lg bg-primary text-white/90 hover:opacity-90">Senden</button>
            </div>
          </section>
        </main>
        <aside class="lg:col-span-4 glass p-4">
          <div class="flex items-center justify-between">
            <h2 class="text-base font-semibold">RAG‑Insights</h2>
          </div>
          <div id="ragSummary" class="mt-3 text-xs text-slate-400"></div>
          <div id="ragMatches" class="mt-3 space-y-3"></div>
        </aside>
      </div>
    </div>
    <script src="astra-core.js"></script>
  </body>
</html>
