
# 1. Datenbank-Verbindung (JDBC) - PROD/CLOUD (³ber Environment Variablen konfigurieren)
spring.datasource.url=${DB_URL:jdbc:postgresql://<HOST>:5432/<DB_NAME>}
spring.datasource.username=${DB_USERNAME:<DB_USERNAME>}
spring.datasource.password=${DB_PASSWORD:<DB_PASSWORD>}
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. JPA / Hibernate Einstellungen
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# 3. KI Konfiguration (OpenRouter)
ai.api.key=${OPENROUTER_API_KEY:__SET_ME__}
ai.api.url=https://openrouter.ai/api/v1
ai.model=deepseek/deepseek-chat

                
