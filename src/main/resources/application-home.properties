# ============================================================================
# PROFIL: HOME (Production – Neon PostgreSQL + pgvector)
# ============================================================================
# Environment Variables (nicht in Git!):
#   DATABASE_URL=postgresql://user:pass@neon-endpoint:5432/neondb
#   OPENROUTER_API_KEY=sk-...

# Database: Neon PostgreSQL mit pgvector
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQL10Dialect
spring.jpa.properties.hibernate.default_schema=public

# pgvector Integration
spring.jpa.properties.hibernate.types.tree.useSQL=true

# AI Service (OpenRouter)
ai.api.url=https://openrouter.ai/api/v1
ai.api.key=${OPENROUTER_API_KEY}
ai.model=deepseek/deepseek-chat

# Logging (Production: nur Errors)
logging.level.com.ayntracore=INFO
logging.level.org.hibernate.SQL=WARN
