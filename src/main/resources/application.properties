# ============================================================================
# H2 In-Memory Datenbank Konfiguration
# ============================================================================
# H2 ist eine reine Java-Datenbank, die im Arbeitsspeicher l�uft.
# Vorteile: Keine Installation n�tig, l�uft ohne Admin-Rechte, perfekt f�r Entwicklung/Testing
# Nachteil: Daten gehen beim Neustart verloren (In-Memory)

# Verbindungs-URL zur H2-Datenbank
# Format: jdbc:h2:mem:<datenbankname>
# "mem" bedeutet: Datenbank existiert nur im RAM, nicht auf der Festplatte
spring.datasource.url=jdbc:h2:mem:syntracoredb

# JDBC-Treiber f�r H2 (wird automatisch von Spring Boot erkannt)
spring.datasource.driverClassName=org.h2.Driver

# Standard-Benutzername f�r H2 (sa = System Administrator)
spring.datasource.username=sa

# Passwort leer lassen (Standard f�r H2 in Entwicklungsumgebungen)
spring.datasource.password=

# Hibernate-Dialekt: Teilt Hibernate mit, welche SQL-Syntax verwendet werden soll
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ============================================================================
# H2 Console (Web-Interface)
# ============================================================================
# Aktiviert die H2-Konsole, um die Datenbank im Browser zu verwalten
# Zugriff nach Start: http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:mem:syntracoredb
spring.h2.console.enabled=true

# ============================================================================
# JPA/Hibernate Konfiguration
# ============================================================================
# DDL-Auto-Modus: "update" bedeutet:
# - Hibernate erstellt Tabellen automatisch, wenn sie nicht existieren
# - Bestehende Tabellen werden bei Schema-�nderungen aktualisiert
# - Daten bleiben erhalten (im Gegensatz zu "create-drop" oder "create")
# Alternative Werte: none, validate, create, create-drop
spring.jpa.hibernate.ddl-auto=update