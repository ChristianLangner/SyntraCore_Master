# Autor: Christian Langner
# AyntraCore – Root Application Configuration

spring.application.name=ayntracore
spring.application.version=3.0
server.port=8080
spring.profiles.active=home

# JPA / Hibernate (Basis)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Logging
logging.level.root=INFO
logging.level.com.ayntracore=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

# AI Provider Configuration
ai.openrouter.key=dummy
openrouter.api.url=https://openrouter.ai/api/v1
ai.model.chat=google/gemini-flash-1.5
ai.model.embedding=text-embedding-ada-002
ai.model.image=dall-e-3
ai.model.image.cheap=dall-e-2
ai.model.image.unfiltered=dall-e-3
