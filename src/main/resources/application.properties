# Aktiviere 'school' fuer H2 oder 'home' fuer Supabase
spring.profiles.active=home
# Gemeinsame Einstellungen koennen hier bleiben, falls noetig
spring.application.name=AyntraCore
# ============================================================================
# AI PROVIDER CONFIGURATION
# ============================================================================
ayntracore.ai.provider=${AI_PROVIDER:OPENAI}
# OpenAI Settings
ayntracore.ai.openai.api-key=${OPENAI_API_KEY:__REPLACE_ME__}
ayntracore.ai.openai.model=gpt-4o
# DeepSeek Settings
ayntracore.ai.deepseek.api-key=${DEEPSEEK_API_KEY:__REPLACE_ME__}
ayntracore.ai.deepseek.model=deepseek-chat
