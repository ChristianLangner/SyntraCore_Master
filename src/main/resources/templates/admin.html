<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyntraCore | Admin-Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen p-8">

<div class="max-w-6xl mx-auto space-y-12">
    <header class="flex justify-between items-center border-b border-gray-700 pb-6">
        <h1 class="text-3xl font-bold text-blue-400">⚙️ SyntraCore Admin-Panel</h1>
        <a href="/index.html" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded transition">Zum Chat</a>
    </header>

    <section class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
        <h2 class="text-xl font-semibold mb-4 text-green-400">Neues Wissen hinzufügen (RAG-Ingest)</h2>
        <form action="/admin/add-knowledge" method="post" class="space-y-4">
            <div>
                <label class="block text-sm text-gray-400 mb-1">Kategorie (z.B. Installation, Login)</label>
                <input type="text" name="category" required
                       class="w-full bg-gray-700 border border-gray-600 rounded p-2 focus:border-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">Inhalt (Wissenstext für die KI)</label>
                <textarea name="content" rows="4" required
                          class="w-full bg-gray-700 border border-gray-600 rounded p-2 focus:border-blue-500 outline-none"></textarea>
            </div>
            <button type="submit" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded font-bold transition">
                Wissen speichern
            </button>
        </form>
    </section>

    <section>
        <h2 class="text-xl font-semibold mb-4 text-blue-400">Aktuelle Wissensdatenbank</h2>
        <div class="bg-gray-800 rounded-xl border border-gray-700 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-700 text-gray-300 uppercase text-xs">
                <tr>
                    <th class="p-4">UUID (ID)</th>
                    <th class="p-4">Kategorie</th>
                    <th class="p-4">Inhalt</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-gray-700">
                <tr th:each="entry : ${knowledgeEntries}" class="hover:bg-gray-750 transition">
                    <td class="p-4 text-xs font-mono text-gray-500" th:text="${entry.id}">UUID</td>
                    <td class="p-4 font-semibold" th:text="${entry.category}">Kategorie</td>
                    <td class="p-4 text-gray-400 text-sm" th:text="${entry.content}">Wissenstext</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>

    <section>
        <h2 class="text-xl font-semibold mb-4 text-yellow-400">Eingegangene Support-Tickets</h2>
        <div class="bg-gray-800 rounded-xl border border-gray-700 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-700 text-gray-300 uppercase text-xs">
                <tr>
                    <th class="p-4">Erstellt am</th>
                    <th class="p-4">Kunde</th>
                    <th class="p-4">Anfrage</th>
                    <th class="p-4">KI-Analyse</th>
                    <th class="p-4">Aktion</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-gray-700">
                <tr th:each="ticket : ${openTickets}" class="hover:bg-gray-750 transition">
                    <td class="p-4 text-sm" th:text="${#temporals.format(ticket.createdAt, 'dd.MM.yyyy HH:mm')}">Datum</td>
                    <td class="p-4 font-semibold" th:text="${ticket.customerName}">Kunde</td>
                    <td class="p-4 text-sm text-gray-400" th:text="${ticket.message}">Nachricht</td>
                    <td class="p-4 text-sm italic text-blue-300" th:text="${ticket.aiAnalysis}">KI Antwort</td>
                    <td class="p-4">
                        <form action="/admin/resolve-ticket" method="post">
                            <input type="hidden" name="ticketId" th:value="${ticket.id}">
                            <button type="submit" class="text-xs bg-green-700 hover:bg-green-600 px-2 py-1 rounded">Erledigt</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>

<section>
  <h2>Persona / Bot-Charakter</h2>

  <form method="post" action="/admin/update-persona">
    <div>
      <label for="prompt">System Prompt (Identität)</label><br/>
      <textarea id="prompt" name="prompt" rows="6" cols="80"
                placeholder="z.B. Du bist der Support-Bot der Firma ..."></textarea>
    </div>

    <div style="margin-top: 12px;">
      <label for="style">Speaking Style (Ton & Stil)</label><br/>
      <input id="style" name="style" type="text" size="80"
             placeholder="z.B. freundlich, kurz, lösungsorientiert"/>
    </div>

    <div style="margin-top: 12px;">
      <button type="submit">Persona aktualisieren</button>
    </div>
  </form>
</section>

</div>

</body>
</html>
