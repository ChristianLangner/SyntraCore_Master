# 1. KI Konfiguration (OpenRouter)
ai.api.key=${OPENROUTER_API_KEY}
ai.api.url=https://openrouter.ai/api/v1
ai.model=deepseek/deepseek-chat

# 2. Datenbank Konfiguration (H2 in-memory)
spring.datasource.url=jdbc:h2:mem:syntracoredb;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 3. JPA / Hibernate Einstellungen
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# Server Port (Standard)
server.port=8080